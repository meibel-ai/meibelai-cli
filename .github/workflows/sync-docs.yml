name: Sync CLI Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'api.json'
      - '.github/workflows/sync-docs.yml'
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout CLI repo
      uses: actions/checkout@v4
      with:
        path: cli

    - name: Checkout docs repo
      uses: actions/checkout@v4
      with:
        repository: meibel-ai/docs  # Your Mintlify docs repo
        token: ${{ secrets.DOCS_REPO_TOKEN }}
        path: docs

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Generate documentation
      working-directory: cli
      run: |
        # Generate Mintlify docs
        ./scripts/generate-mintlify-docs.sh ../docs/cli
        
        # Generate API operation matrix
        ./scripts/generate-api-matrix.sh > ../docs/cli/api-operations.mdx

    - name: Check for changes
      id: changes
      working-directory: docs
      run: |
        git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

    - name: Create Pull Request
      if: steps.changes.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.DOCS_REPO_TOKEN }}
        path: docs
        commit-message: 'docs: sync CLI documentation'
        title: '📚 Update CLI Documentation'
        body: |
          ## Automated CLI Documentation Update
          
          This PR updates the CLI documentation based on changes in the CLI repository.
          
          ### Changes
          - Updated command references
          - Synced with latest CLI version: ${{ github.sha }}
          - Generated from: `${{ github.event_name }}` event
          
          ### Checklist
          - [ ] Review command descriptions
          - [ ] Verify examples are accurate
          - [ ] Check navigation structure
          
          ---
          *This PR was automatically generated by the sync-docs workflow.*
        branch: cli-docs-sync-${{ github.sha }}
        delete-branch: true
        labels: |
          documentation
          automated
        reviewers: |
          tech-lead
          docs-team